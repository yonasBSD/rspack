name: Bench Rust

on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string
      runner: # Runner labels
        required: true
        type: string
      measurement: # CodSpeed measurement mode, "simulation" or "walltime"
        required: false
        type: string
        default: 'simulation'
      bench_target: # Optional Cargo benchmark target to build and run
        required: false
        type: string
        default: ''
      bench_filter: # Optional Cargo benchmark name filter to run
        required: false
        type: string
        default: ''
      ref: # Git reference to checkout
        required: false
        type: string

env:
  # Since CI builds are more akin to from-scratch builds, incremental compilation adds unnecessary dependency-tracking and IO overhead, reducing caching effectiveness.
  # https://github.com/rust-lang/rust-analyzer/blob/25368d24308d6a94ffe8b99f0122bcf5a2175322/.github/workflows/ci.yaml#L11
  CARGO_INCREMENTAL: 0

permissions:
  issues: write

jobs:
  bench-rust:
    name: 'Bench Rust ${{ inputs.measurement }}'
    runs-on: ${{ fromJSON(inputs.runner) }}
    env:
      BENCH_MODE: ${{ inputs.measurement }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.ref }}
          clean: ${{ runner.environment == 'github-hosted' }}

      - name: Pnpm Setup
        timeout-minutes: 5
        uses: ./.github/actions/pnpm/setup

      - name: Prepare benchmark cases
        run: pnpm run bench:prepare

      - name: Install Rust Toolchain
        uses: ./.github/actions/rustup
        with:
          save-if: true
          key: rust-bench-${{ inputs.target }}

      - name: Install cargo-codspeed binary
        uses: taiki-e/install-action@25435dc8dd3baed7417e0c96d3fe89013a5b2e09 # v2
        with:
          tool: cargo-codspeed@4.4.1

      - name: Setup Rust Target
        run: rustup target add ${{ inputs.target }}

      - name: Run Cargo codegen
        run: cargo codegen

      - name: Build benchmark (${{ inputs.measurement }})
        run: |
          bench_args=()
          if [ -n "${{ inputs.bench_target }}" ]; then
            bench_args+=(--bench "${{ inputs.bench_target }}")
          else
            bench_args+=(--bench benches --bench rspack_sources)
          fi
          cargo codspeed build -m ${{ inputs.measurement }} --profile codspeed -p rspack_benchmark "${bench_args[@]}"

      - name: Prepare CodSpeed temporary directory
        run: mkdir -p "${RUNNER_TEMP}/codspeed-valgrind-tmp"

      - name: Run benchmark (simulation)
        if: ${{ inputs.measurement == 'simulation' }}
        uses: hardfist/action@750625725fb8def914579fc789c6249580c84a95
        timeout-minutes: 30
        env:
          TMPDIR: ${{ runner.temp }}/codspeed-valgrind-tmp
          CODSPEED_EXPERIMENTAL_FAIR_SCHED: true
          MIMALLOC_PURGE_DELAY: '-1'
        with:
          mode: simulation
          run: |
            if [ -n "${{ inputs.bench_target }}" ]; then
              bench_args=(--bench "${{ inputs.bench_target }}")
              if [ -n "${{ inputs.bench_filter }}" ]; then
                bench_args+=("${{ inputs.bench_filter }}")
              fi
              RSPACK_BENCHCASES_DIR=$PWD/.bench/rspack-benchcases cargo codspeed run "${bench_args[@]}"
            else
              pnpm run bench:rust
            fi
          token: ${{ secrets.CODSPEED_TOKEN }}
          runner-version: rev:2ca934f5a71e0299e0a3941a84ac3b242b3b63b6
          skip-hash-check-warning: true

      - name: Run benchmark (walltime)
        if: ${{ inputs.measurement == 'walltime' }}
        uses: hardfist/action@750625725fb8def914579fc789c6249580c84a95
        timeout-minutes: 30
        env:
          TMPDIR: ${{ runner.temp }}/codspeed-valgrind-tmp
        with:
          mode: walltime
          run: |
            sync; echo 1 > /proc/sys/vm/drop_caches
            if [ -n "${{ inputs.bench_target }}" ]; then
              bench_args=(--bench "${{ inputs.bench_target }}")
              if [ -n "${{ inputs.bench_filter }}" ]; then
                bench_args+=("${{ inputs.bench_filter }}")
              fi
              taskset -c 176-191 env RSPACK_BENCHCASES_DIR=$PWD/.bench/rspack-benchcases cargo codspeed run "${bench_args[@]}"
            else
              taskset -c 176-191 pnpm run bench:rust
            fi
          token: ${{ secrets.CODSPEED_TOKEN }}
          runner-version: rev:2ca934f5a71e0299e0a3941a84ac3b242b3b63b6
          skip-hash-check-warning: true

      - name: Prepare Valgrind temporary files artifact
        if: ${{ always() && inputs.measurement == 'simulation' }}
        run: |
          mkdir -p "${RUNNER_TEMP}/codspeed-valgrind-tmp"
          {
            echo "TMPDIR=${RUNNER_TEMP}/codspeed-valgrind-tmp"
            echo
            find "${RUNNER_TEMP}/codspeed-valgrind-tmp" -mindepth 1 -maxdepth 2 -printf '%M %s %p\n' | sort
          } > "${RUNNER_TEMP}/codspeed-valgrind-tmp/MANIFEST.txt"

      - name: Upload Valgrind temporary files
        if: ${{ always() && inputs.measurement == 'simulation' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: codspeed-valgrind-tmp-${{ inputs.target }}
          path: ${{ runner.temp }}/codspeed-valgrind-tmp
          include-hidden-files: true
          if-no-files-found: ignore
          overwrite: true
