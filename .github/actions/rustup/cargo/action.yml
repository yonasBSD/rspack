name: cargo cache

description: Cache rust dependencies to github or local

inputs:
  key:
    required: true
  save-if:
    default: false
    required: false
    type: boolean

runs:
  using: composite
  steps:
    - name: Cache to github
      if: ${{ runner.environment == 'github-hosted' }}
      uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        prefix-key: 'RCache-G-6'
        shared-key: ${{ inputs.key }}
        save-if: ${{ inputs.save-if }}
        cache-workspace-crates: 'true'
        cache-all-crates: 'true'

    - name: Cache to local
      uses: rstackjs/rust-cache@294670d9b2e7123011ba691897c24a5ee48cb816 # v0.0.3
      if: ${{ runner.environment == 'self-hosted' }}
      with:
        prefix-key: 'RCache-L-9'
        shared-key: ${{ inputs.key }}
        save-if: ${{ inputs.save-if }}
        fullmatch-only: 'true'
        cache-workspace-crates: 'true'
        cache-all-crates: 'true'
