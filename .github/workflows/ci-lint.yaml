name: CI-Lint

on:
  pull_request:
    types: [opened, synchronize]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:
  push:
    branches:
      - main
      - v1.x
    tags-ignore:
      - '**'
jobs:
  lint:
    name: Lint and format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Pnpm Setup
        uses: ./.github/actions/pnpm/setup

      - name: Pnpm Install
        run: pnpm i

      - name: Lint js
        run: pnpm run lint-ci:js

      - name: Prettier
        run: pnpm run format-ci:js

      - name: Check Dependency Version
        run: pnpm run check-dependency-version

      - name: Website Spell Check
        run: pnpm --dir website run check:spell

      - name: Typos Check
        uses: crate-ci/typos@7b04f660f4ee4f048d18fd341887cf28dfbedfe2 # v1.46.3
        with:
          files: .
