name: Reusable Release

on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string
      runner: # Runner labels
        required: true
        type: string
      test-runner: # Test Runner labels
        required: false
        type: string
      profile: # Rust profile, "ci" or "production" or "profiling"
        default: 'ci'
        required: false
        type: string
      test: # Run tests?
        type: boolean
        required: false
        default: false
      ref: # Git reference to checkout
        required: false
        type: string
      binding_postfix: # Use when building multiple profiles in one workflow run; appends a postfix to the uploaded artifact name to distinguish each build.
        required: false
        type: string
      force-rebuild: # Disable Rust cache and build from scratch, e.g. for release builds
        required: false
        type: boolean
        default: false

permissions:
  # Allow commenting on issues
  issues: write

jobs:
  build:
    uses: ./.github/workflows/reusable-build-build.yml
    with:
      target: ${{ inputs.target }}
      runner: ${{ inputs.runner }}
      profile: ${{ inputs.profile }}
      ref: ${{ inputs.ref }}
      binding_postfix: ${{ inputs.binding_postfix }}
      force-rebuild: ${{ inputs.force-rebuild }}
  test:
    name: Test ${{ inputs.target }}
    # The wasm browser variant is a build-only artifact; the wasi (node) variant
    # already runs the wasm tests (node + browser e2e via a renamed copy).
    if: inputs.test && inputs.binding_postfix != '-browser'
    needs: build
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      target: ${{ inputs.target }}
      runner: ${{ inputs.test-runner || inputs.runner }}
      ref: ${{ inputs.ref }}
